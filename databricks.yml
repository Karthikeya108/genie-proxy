bundle:
  name: "genie-proxy"

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  apps:
    genie-proxy-app:
      name: "genie-proxy"
      description: "Genie Proxy - Access Databricks Genie Spaces across workspaces with intelligent QPM request queuing backed by Lakebase"
      source_code_path: ./.build
      resources:
        - name: "db"
          database:
            database_name: "databricks_postgres"
            instance_name: "demo-instance"
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    mode: development
    default: true
  staging:
    mode: development
  prod: {}
